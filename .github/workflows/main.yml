name: Django Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: thesis_library
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -hmysql -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: thesis_library
      MYSQL_PORT: 3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Wait for DB
        run: |
          sudo apt-get install -y mysql-client
          until mysqladmin ping -hmysql -uroot -proot --silent; do
            echo "Waiting for database..."
            sleep 3
          done


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt




      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test
