# Django Test Suite
name: Django Test Suite

on:
  push:
    branches: [ testing ]
  pull_request:
    branches: [ testing ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testcase:

          # ======================================================
          # TC001 – TC033 (AuthTestCase)
          # ======================================================
          - main.tests.AuthTestCase.test_tc001_login_valid
          - main.tests.AuthTestCase.test_tc002_signup_valid
          - main.tests.SearchFilterTestCase.test_tc003_search_title_author_keyword
          - main.tests.SearchFilterTestCase.test_tc004_filter_by_category_year_author
          - main.tests.SubmissionStagesTestCase.test_tc005_basic_info_stage
          - main.tests.SubmissionStagesTestCase.test_tc006_thesis_details_stage
          - main.tests.SubmissionStagesTestCase.test_tc007_file_upload_stage
          - main.tests.SubmissionStagesTestCase.test_tc008_supervisor_info_stage
          - main.tests.SubmissionStagesTestCase.test_tc009_review_and_submit_stage
          - main.tests.AdminPanelTestCase.test_tc010_audit_logs
          - main.tests.AdminPanelTestCase.test_tc011_groups_permissions
          - main.tests.AdminPanelTestCase.test_tc012_create_admin_user
          - main.tests.AdminPanelTestCase.test_tc013_add_category
          - main.tests.AdminPanelTestCase.test_tc014_add_course
          - main.tests.AdminPanelTestCase.test_TC015_delete_student
          - main.tests.AdminPanelTestCase.test_tc016_add_rejected_thesis
          - main.tests.ChangePasswordTests.test_tc017_my_submissions_page
          - main.tests.ChangePasswordTests.test_tc018_edit_user_form_renders
          - main.tests.Updated_Test.test_tc019_deep_search_mode


          # ======================================================
          # ✅ TC020 – TC027 (Setups)
          # ======================================================
          - main.tests.Setups.test_tc020_landing_page_loads
          - main.tests.Setups.test_tc021_about_page_loads
          - main.tests.Setups.test_tc022_categories_page_loads
          - main.tests.Setups.test_tc023_download_disabled_for_invalid_id
          - main.tests.Setups.test_tc024_index_page_loads
          - main.tests.Setups.test_tc025_api_departments_valid
          - main.tests.Setups.test_tc026_api_departments_invalid
          - main.tests.Setups.test_tc027_api_courses_valid


          # ======================================================
          # ✅ TC028 – TC032 (MySubmissionsTests)
          # ======================================================
          - main.tests.MySubmissionsTests.test_tc028_my_submissions_requires_login
          - main.tests.MySubmissionsTests.test_tc029_signup_json
          - main.tests.MySubmissionsTests.test_tc030_signup_duplicate_username
          - main.tests.MySubmissionsTests.test_tc031_login_json_success
          - main.tests.MySubmissionsTests.test_tc032_login_json_invalid

          # ======================================================
          # ✅ TC033 – TC035 (UserListTests)
          # ======================================================
          - main.tests.UserListTests.test_tc033_user_list_page_loads
          - main.tests.UserListTests.test_tc034_user_list_displays_users
          - main.tests.UserListTests.test_tc035_user_list_requires_login

          # ======================================================
          # ✅ TC033 – TC035 (UserListTests)
          # ======================================================
          - main.tests.SubmissionTestCase.test_tc036_my_submissions_empty
          - main.tests.SubmissionTestCase.test_TC37_serve_thesis_page_image

          # ======================================================
          # ✅ TC038 – TC040 (StudentsListTests)
          # ======================================================
          - main.tests.StudentsListTests.test_tc038_students_list_loads
          - main.tests.StudentsListTests.test_tc039_professors_list_loads
          - main.tests.StudentsListTests.test_TC040_login_view

          # ======================================================
          # ✅ TC041 – TC043 (ThesisDetailTests)
          # ======================================================
          - main.tests.ThesisDetailTests.test_tc041_thesis_detail_loads
          - main.tests.ThesisDetailTests.test_tc042_thesis_detail_displays_info
          - main.tests.ThesisDetailTests.test_tc043_thesis_detail_invalid_id

          # ======================================================
          # ✅ TC044 – TC047 (EditUserTest)
          # ======================================================
          - main.tests.EditUserTests.test_tc044_edit_user_loads
          - main.tests.EditUserTests.test_tc045_edit_user_updates_info
          - main.tests.EditUserTests.test_tc046_edit_user_requires_login
          - main.tests.EditUserTests.test_tc047_edit_user_invalid_id



          # ======================================================
          # ✅ TC048 – TC054 (STUD DB)
          # ======================================================
          - main.tests.StudentDB.test_tc048_student_dashboard
          - main.tests.StudentDB.test_tc049_profile_card
          - main.tests.StudentDB.test_tc050_category_detail
          - main.tests.StudentDB.test_tc051_create_submission
          - main.tests.StudentDB.test_tc052_my_submissions
          - main.tests.AdminCategoriesTests.test_tc053_admin_categories_loads
          - main.tests.AdminCategoriesTests.test_tc054_signup_view


          # ======================================================
          # ✅ TC055 – TC060 (Landing / About / Student Dashboard)
          # ======================================================
          - main.tests.LandingAboutIndexTests.test_tc055_view_thesis
          - main.tests.LandingAboutIndexTests.test_TC056_landing_page_contains_content
          - main.tests.LandingAboutIndexTests.test_TC057_delete_professor
          - main.tests.LandingAboutIndexTests.test_TC058_about_page_contains_text
          - main.tests.LandingAboutIndexTests.test_TC059_student_dashboard_loads
          - main.tests.LandingAboutIndexTests.test_TC060_student_dashboard_contains_categories

          # ======================================================
          # ✅ TC061 – TC090 (URL Routing / Admin / API Endpoints)
          # ======================================================
          - main.tests.TestUrls.test_TC061_verify_email
          - main.tests.TestUrls.test_TC062_forgot_password
          - main.tests.TestUrls.test_TC063_reset_password
          - main.tests.TestUrls.test_TC064_change_password_profile
          - main.tests.TestUrls.test_TC065_api_departments
          - main.tests.TestUrls.test_TC066_api_courses
          - main.tests.TestUrls.test_TC067_api_extract_abstract
          - main.tests.TestUrls.test_TC068_admin_dashboard
          - main.tests.TestUrls.test_TC069_admin_log_entries
          - main.tests.TestUrls.test_TC070_user_list
          - main.tests.TestUrls.test_TC071_delete_user
          - main.tests.TestUrls.test_TC072_edit_user
          - main.tests.TestUrls.test_TC073_change_password
          - main.tests.TestUrls.test_TC074_pending_submissions
          - main.tests.TestUrls.test_TC075_approve_thesis
          - main.tests.TestUrls.test_TC076_reject_thesis
          - main.tests.TestUrls.test_TC077_rejected_thesis_list
          - main.tests.TestUrls.test_TC078_theses_list
          - main.tests.TestUrls.test_TC079_departments_list
          - main.tests.TestUrls.test_TC080_courses_list
          - main.tests.TestUrls.test_TC081_students_list
          - main.tests.TestUrls.test_TC082_professors_list
          - main.tests.TestUrls.test_TC083_import_students
          - main.tests.TestUrls.test_TC084_add_student
          - main.tests.TestUrls.test_TC085_edit_student
          - main.tests.TestUrls.test_TC086_add_professor
          - main.tests.TestUrls.test_TC087_edit_professor
          - main.tests.TestUrls.test_TC088_import_professors
          - main.tests.TestUrls.test_TC089_admin_categories
          - main.tests.TestUrls.test_TC090_archive_old_theses



    services:
      mariadb:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: thesis_library
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      DJANGO_SETTINGS_MODULE: thesis_site.settings
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: thesis_library
      MYSQL_PORT: 3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          until mysqladmin ping -h127.0.0.1 -uroot -proot --silent; do
            echo "Waiting for database..."
            sleep 3
          done

      - name: Ensure database exists
        run: |
          mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS thesis_library;"

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test ${{ matrix.testcase }}
