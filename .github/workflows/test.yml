name: CI with MariaDB

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "test" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: thesis_library
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # Checkout your code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup Python (for Django)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Wait for MariaDB to be ready
      - name: Wait for MariaDB
        run: |
          until mysqladmin ping -hmariadb -uroot -proot --silent; do
            echo "Waiting for MariaDB..."
            sleep 3
          done

      # Run migrations
      - name: Run migrations
        run: |
          python manage.py migrate

      # Run tests
      - name: Run tests
        run: |
          python manage.py test
