{% load static %}
<header class="main-header">
    <div class="container">
        <div class="logo-container">
            <div class="logo-square"></div>
            <h1>Thesis Library</h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="{% url 'landing' %}" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">Categories</a></li>
                <li><a href="{% url 'about' %}" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <a href="/admin/dashboard.php" class="btn btn-outline">Dashboard</a>
                {% else %}
                    <a href="/student/dashboard.php" class="btn btn-outline">Dashboard</a>
                {% endif %}
                <form method="POST" action="{% url 'logout' %}" style="display:inline; margin-left:10px;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline">Log Out</button>
                </form>
            {% endif %}
        </div>
    </div>
</header>
