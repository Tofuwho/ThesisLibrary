<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Library Repository</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <header class="landing-header">
        <div class="landing-header-inner">
            <a href="{% url 'landing' %}" class="logo-link">
                <div class="logo-container">
                    <div class="logo-square"></div>
                    <h1>Thesis Library</h1>
                </div>
            </a>
            <div class="header-flex-center"><!-- intentionally empty: no nav links on landing --></div>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span class="user-welcome">Welcome, <span>{{ user.username }}</span>!</span>
                    {% if user.is_staff %}
                        <a href="{% url 'admin:index' %}" class="dashboard-btn" role="button">Admin Panel</a>
                    {% else %}
                        <a href="{% url 'student_dashboard' %}" class="dashboard-btn" role="button">Dashboard</a>
                    {% endif %}
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">Log Out</button>
                    </form>
                {% else %}
                    <button id="loginButton" class="login-btn" role="button">Login</button>
                {% endif %}
            </div>
        </div>
    </header>
</body>
</html>
