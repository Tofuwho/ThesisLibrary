<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Library Repository</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <header class="landing-header">
        <div class="container">
            <div class="logo">
                <h1>Thesis Library</h1>
            </div>
            <nav>
                <ul class="header-nav-list">
                    {% if user.is_authenticated %}
                        <li class="user-welcome">Welcome, <span>{{ user.username }}</span>!</li>
                        <li>
                            <div class="header-buttons" role="group" aria-label="User actions">
                                {% if user.is_staff %}
                                    <a href="/admin/dashboard.php" class="dashboard-btn" role="button">Admin Dashboard</a>
                                {% else %}
                                    <a href="/student/dashboard.php" class="dashboard-btn" role="button">Student Dashboard</a>
                                {% endif %}
                                <form method="POST" action="{% url 'logout' %}" style="margin:0; padding:0;">
                                    {% csrf_token %}
                                    <button type="submit" class="logout-btn" role="button">Logout</button>
                                </form>
                            </div>
                        </li>
                    {% else %}
                        <li>
                            <div class="header-buttons" role="group" aria-label="Login">
                                <button id="loginButton" class="login-btn" role="button">Login</button>
                            </div>
                        </li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>
