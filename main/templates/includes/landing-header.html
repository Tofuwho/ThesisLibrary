<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Library Repository</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <header class="landing-header">
        <div class="container">
            <div class="logo">
                <h1>Thesis Library</h1>
            </div>
            <nav>
                <ul>
                    {% if user.is_authenticated %}
                        <li><span class="user-welcome">Welcome, {{ user.username }}</span></li>
                        {% if user.is_staff %}
                            <li><a href="{% url 'admin_dashboard' %}" class="dashboard-btn">Admin Dashboard</a></li>
                        {% else %}
                            <li><a href="{% url 'student_dashboard' %}" class="dashboard-btn">Student Dashboard</a></li>
                        {% endif %}
                        <li><a href="{% url 'logout' %}" class="logout-btn">Logout</a></li>
                    {% else %}
                        <li><button id="openModal" class="login-btn">Login</button></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>
