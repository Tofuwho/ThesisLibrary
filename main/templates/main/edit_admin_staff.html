{% extends 'main/base.html' %}
{% load static %}
{% block content %}
<div class="admin-layout">
  {% include 'main/admin_sidebar.html' %}
  <div class="admin-main">
    <a href="{% url 'admin_staff_list' %}" style="display:inline-block; margin-bottom:1rem; color:#0277bd;">← Back</a>
    <div class="dashboard-header"><h1>✏️ Edit Admin Staff</h1></div>
    <div style="max-width:600px; margin:2rem auto; background:#fff; padding:2rem; border-radius:12px; border:1px solid #eee;">
      <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:1rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Admin ID:</label>
          <input type="text" value="{{ admin.admin_id }}" readonly style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:8px; background:#f5f5f5;">
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600;">First Name:</label>
          <input type="text" name="first_name" value="{{ admin.first_name }}" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:8px;">
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Last Name:</label>
          <input type="text" name="last_name" value="{{ admin.last_name }}" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:8px;">
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Email:</label>
          <input type="email" name="email" value="{{ admin.email }}" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:8px;">
        </div>
        <button type="submit" style="width:100%; padding:1rem; background:#43a047; color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Update Admin Staff</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
