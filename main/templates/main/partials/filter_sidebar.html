<aside class="filter-sidebar">
    <div class="sidebar-header">
        <h2>Filters</h2>
        <button type="button" class="clear-filters-btn" onclick="clearAllFilters();"><i class="fas fa-undo"></i> Reset</button>
    </div>
    <form id="filter-form" method="get">
        <input type="hidden" name="search" value="{{ request.GET.search }}">
        <input type="hidden" name="sort" value="{{ current_sort }}">
        <input type="hidden" name="department" id="department-input" value="{{ request.GET.department|default:'all' }}">
        <input type="hidden" name="search_mode" value="{{ request.GET.search_mode|default:'normal' }}">

        <!-- Publication Date Filter -->
        <div class="filter-section">
            <h3 onclick="this.parentElement.classList.toggle('collapsed')">
                Publication Year <i class="fas fa-chevron-down toggle-icon" style="margin-left: auto; font-size: 0.65rem;"></i>
            </h3>
            <ul class="filter-list scrollable-filter">
                {% for year in years %}
                <li>
                    <label>
                        <input type="checkbox" name="year" value="{{ year.year }}"
                            {% if year.year|stringformat:"i" in request.GET.year or year.year in filters.years %}checked{% endif %}>
                        <span>{{ year.year }}</span>
                        <span class="count">{{ year.count }}</span>
                    </label>
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Category Filter -->
        <div class="filter-section">
            <h3 onclick="this.parentElement.classList.toggle('collapsed')">
                Category <i class="fas fa-chevron-down toggle-icon" style="margin-left: auto; font-size: 0.65rem;"></i>
            </h3>
            <ul class="filter-list scrollable-filter">
                {% for cat_item in categories %}
                <li>
                    <label>
                        <input type="checkbox" name="category" value="{{ cat_item.name }}"
                            {% if cat_item.name in request.GET.category or cat_item.name in request.GET.descriptor %}checked{% endif %}>
                        <span>{% if cat_item.name == 'Graduate School' %}Graduate{% else %}{{ cat_item.name }}{% endif %}</span>
                        <span class="count">{{ cat_item.count|default:0 }}</span>
                    </label>
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Department Courses Filter (Dynamic via selected department) -->
        <div class="filter-section dynamic-courses-section {% if not selected_department or selected_department == 'all' %}hidden-filter{% endif %}">
            <h3 onclick="this.parentElement.classList.toggle('collapsed')">
                Program Courses <i class="fas fa-chevron-down toggle-icon" style="margin-left: auto; font-size: 0.65rem;"></i>
            </h3>
            <ul class="filter-list scrollable-filter" id="dynamic-courses-list">
                {% for course in courses %}
                <li>
                    <label>
                        <input type="checkbox" name="course" value="{{ course.id }}"
                            {% if course.id|stringformat:"i" in request.GET.course %}checked{% endif %}>
                        <span>{{ course.name }}</span>
                    </label>
                </li>
                {% endfor %}
            </ul>
        </div>

        <button type="submit" class="apply-filters-button">
            <i class="fas fa-filter"></i> Apply Filters
        </button>
    </form>
</aside>
