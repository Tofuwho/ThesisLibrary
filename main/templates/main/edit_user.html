{% extends 'main/base.html' %}
{% load static %}

{% block body_class %}admin-page{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
{% endblock %}

{% block content %}
<div class="admin-layout">
  {% include 'main/admin_sidebar.html' %}

  <main class="admin-main">
    <div class="edit-user-container">
      <div class="edit-user-header">
        <h1>✏️ Edit User</h1>
        <a href="{% url 'user_list' %}" class="back-btn">← Back to Users</a>
      </div>

      <form method="post" class="edit-user-form">
        {% csrf_token %}

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" value="{{ user.username }}" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="{{ user.email }}" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" value="********" disabled
            style="width:100%; background:#2a2a2a; border:none; padding:10px; border-radius:8px;">
          <button type="button" id="changePasswordBtn" class="btn-secondary" style="margin-top:10px;">Change
            Password</button>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">💾 Save Changes</button>
        </div>
      </form>
    </div>
  </main>
</div>

<!-- Password Change Modal -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <h2>Change Password</h2>
    <form method="post" action="{% url 'edit_user' user.id %}" class="password-form">
      {% csrf_token %}
      <input type="hidden" name="change_password" value="1">

      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
        <button type="submit" class="btn-save">Save Password</button>
      </div>
    </form>
  </div>
</div>

<style>
  /* === Page Layout === */
  .edit-user-container {
    background: #1f1f1f;
    padding: 2rem;
    border-radius: 16px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    color: #fff;
    margin: 2rem;
  }

  .edit-user-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .edit-user-header h1 {
    font-size: 1.8rem;
    font-weight: 600;
  }

  .back-btn {
    background: #2a2a2a;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.2s;
  }

  .back-btn:hover {
    background: #444;
  }

  /* === Form Styling === */
  .edit-user-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .form-group label {
    font-weight: 500;
    color: #bbb;
    margin-bottom: 0.3rem;
    display: block;
  }

  .form-group input {
    width: 100%;
    background: #2a2a2a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    transition: 0.2s;
  }

  .form-group input:focus {
    outline: 2px solid #6a5acd;
    background: #333;
  }

  .btn-secondary {
    background: #2196f3;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-secondary:hover {
    background: #42a5f5;
    box-shadow: 0 0 8px #2196f3aa;
  }

  /* === Save Button === */
  .form-actions {
    margin-top: 1rem;
  }

  .btn-save {
    background: linear-gradient(90deg, #4caf50, #81c784);
    color: #fff;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-save:hover {
    box-shadow: 0 0 10px #66bb6a;
    transform: translateY(-2px);
  }

  /* === Modal === */
  .modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    background: #2b2b2b;
    color: white;
    border-radius: 10px;
    padding: 2rem;
    width: 400px;
  }

  .modal-content input {
    width: 100%;
    padding: 8px;
    margin-bottom: 1rem;
    border-radius: 5px;
    border: none;
  }

  .btn-cancel {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
  }

  .btn-cancel:hover {
    background-color: #c0392b;
  }
</style>

<script>
  // Open / close modal
  const modal = document.getElementById("passwordModal");
  document.getElementById("changePasswordBtn").onclick = () => modal.style.display = "flex";
  document.getElementById("cancelModal").onclick = () => modal.style.display = "none";
  window.onclick = e => { if (e.target === modal) modal.style.display = "none"; };

  // Handle password change
  document.getElementById("passwordForm").onsubmit = async function (e) {
    e.preventDefault();

    const userId = document.getElementById("userId").value;
    const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;

    const formData = new FormData(this);
    const response = await fetch(`/users/change-password/${userId}/`, {
      method: "POST",
      headers: { "X-CSRFToken": csrfToken },
      body: formData
    });

    const data = await response.json();
    alert(data.message);

    if (data.success) modal.style.display = "none";
  };
</script>
{% endblock %}
