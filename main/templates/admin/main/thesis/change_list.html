{% extends "admin/change_list.html" %}
{% load i18n %}

{% block extrahead %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add confirmation for delete actions
    const deleteLinks = document.querySelectorAll('a[href*="delete/"]');
    deleteLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
            const thesisTitle = this.closest('tr').querySelector('td.field-title a')?.textContent || 'this thesis';
            if (!confirm('⚠️ WARNING: You are about to permanently delete "' + thesisTitle + '".\n\nThis action cannot be undone!\n\nAre you sure you want to continue?')) {
                e.preventDefault();
                return false;
            }
        });
    });
    
    // Add confirmation for bulk delete actions
    const bulkDeleteForm = document.querySelector('form[action*="delete_selected"]');
    if (bulkDeleteForm) {
        bulkDeleteForm.addEventListener('submit', function(e) {
            const selectedCount = document.querySelectorAll('input[name="_selected_action"]:checked').length;
            if (selectedCount > 0) {
                if (!confirm('⚠️ WARNING: You are about to permanently delete ' + selectedCount + ' thesis(es).\n\nThis action cannot be undone!\n\nAre you sure you want to continue?')) {
                    e.preventDefault();
                    return false;
                }
            }
        });
    }
});
</script>
{% endblock %}
